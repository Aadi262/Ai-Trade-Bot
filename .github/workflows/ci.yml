name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Security scan
        run: pip-audit -r requirements-ci.txt --ignore-vuln GHSA-r9hx-vwmv-q579
        continue-on-error: true  # advisory only — doesn't block CI

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          JWT_SECRET: test-jwt-secret-32-chars-minimum!!
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: memory://
          ANTHROPIC_API_KEY: test-placeholder-key
          POSTGRES_PASSWORD: test
          TRADING_MODE: paper
        run: |
          pytest tests/ -x -q \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=70

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        run: ssh ${{ secrets.VPS_HOST }} 'cd /opt/tradingbot && git pull && docker compose up -d'
